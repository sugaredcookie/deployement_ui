<!DOCTYPE html>
<html lang="en" class="h-full bg-[#020617]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linedata | Releases</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 9px; }
        input:focus, select:focus, textarea:focus {
            box-shadow: 0 0 0 2px rgba(239, 68, 68, 0.4);
            border-color: #ef4444;
        }
    </style>
</head>
<body class="text-slate-200 bg-[#020617] p-4 md:p-8 min-h-screen">
    <div class="max-w-7xl mx-auto">
        <div class="flex items-center justify-between border-b border-slate-800 pb-6 mb-8">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-diagram-project text-red-500 text-3xl"></i>
                <h1 class="text-3xl font-black tracking-tighter text-white">LINEDATA RELEASES</h1>
            </div>
            <div class="flex items-center gap-3">
                <a href="index.html" class="flex items-center gap-2 px-6 py-3 rounded-xl text-sm font-medium transition-all hover:bg-slate-800">
                    <i class="fa-solid fa-list-check text-red-400"></i>
                    <span>Deployment Dashboard</span>
                </a>
                <button onclick="showCreateModal()" 
                        class="flex items-center gap-2 px-6 py-3 bg-red-600 hover:bg-red-700 rounded-xl text-sm font-medium transition-all">
                    <i class="fa-solid fa-plus"></i>
                    <span>New Release</span>
                </button>
            </div>
            <div class="flex items-center gap-2 text-sm font-mono">
                <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
                <span class="text-slate-400">Platform Development</span>
                <span class="text-emerald-400">• LIVE</span>
            </div>
        </div>

        <div class="mb-8 bg-slate-900/60 border border-slate-800 rounded-2xl p-5">
            <div class="flex flex-wrap gap-3">
                <select id="appFilter" onchange="filterReleases()" class="bg-slate-900 border border-slate-700 px-4 py-3 rounded-xl text-sm flex-1 min-w-[200px] cursor-pointer outline-none text-slate-300">
                    <option value="">All Applications</option>
                </select>
                <div class="relative flex-1 min-w-[280px]">
                    <i class="fa-solid fa-magnifying-glass absolute left-4 top-3.5 text-slate-500"></i>
                    <input id="search" type="text" placeholder="Search versions or filenames..." onkeyup="filterReleases()" class="w-full bg-slate-900 border border-slate-700 rounded-xl pl-11 py-3 text-sm focus:outline-none">
                </div>
                <button onclick="clearFilters()" class="px-6 py-3 bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-xl text-sm font-medium transition-colors flex items-center gap-2">
                    <i class="fa-solid fa-rotate-right"></i> Clear
                </button>
            </div>
        </div>

        <div id="releasesContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>

    <div id="releaseModal" class="fixed inset-0 bg-black/80 hidden flex items-center justify-center z-50">
        <div class="bg-slate-900 border border-slate-700 rounded-3xl w-full max-w-3xl mx-4 max-h-[90vh] flex flex-col">
            <div class="flex items-center justify-between border-b border-slate-700 p-6">
                <h2 id="modalTitle" class="text-2xl font-semibold truncate">Release Details</h2>
                <button onclick="closeReleaseModal()" class="text-slate-400 hover:text-white text-3xl leading-none">&times;</button>
            </div>
            <div class="p-6 overflow-auto flex-1 font-mono text-sm bg-slate-950" id="modalContent"></div>
            <div class="border-t border-slate-700 p-4 flex justify-end">
                <button onclick="closeReleaseModal()" class="px-8 py-3 bg-slate-800 hover:bg-slate-700 rounded-2xl text-sm font-medium">Close</button>
            </div>
        </div>
    </div>

    <div id="createModal" class="fixed inset-0 bg-black/80 hidden flex items-center justify-center z-50">
        <div class="bg-slate-900 border border-slate-700 rounded-3xl w-full max-w-2xl mx-4 max-h-[90vh] flex flex-col">
            <div class="flex items-center justify-between border-b border-slate-700 p-6">
                <h2 class="text-2xl font-semibold">Create New Release</h2>
                <button onclick="closeCreateModal()" class="text-slate-400 hover:text-white text-3xl leading-none">&times;</button>
            </div>
            <div class="p-6 overflow-auto flex-1 space-y-5">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm text-slate-400 mb-1">Application</label>
                        <select id="newApp" class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 outline-none">
                            <option value="APP_ALPHA">APP_ALPHA</option>
                            <option value="APP_BETA">APP_BETA</option>
                            <option value="APP_GAMMA">APP_GAMMA</option>
                            <option value="APP_DELTA">APP_DELTA</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm text-slate-400 mb-1">Version</label>
                        <input id="newVersion" type="text" placeholder="2.4.0" class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 outline-none">
                    </div>
                </div>
                <div>
                    <label class="block text-sm text-slate-400 mb-1">Environment</label>
                    <select id="newEnv" class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 outline-none">
                        <option value="UAT">UAT</option>
                        <option value="PROD">PROD</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm text-slate-400 mb-1">Changes (one per line)</label>
                    <textarea id="newChanges" rows="6" placeholder="- Added new feature&#10;- Improved performance&#10;- Fixed critical bug" class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 outline-none resize-none"></textarea>
                </div>
            </div>
            <div class="border-t border-slate-700 p-4 flex gap-3 justify-end">
                <button onclick="closeCreateModal()" class="px-6 py-3 bg-slate-800 hover:bg-slate-700 rounded-2xl">Cancel</button>
                <button onclick="generateAndShowYAML()" class="px-8 py-3 bg-red-600 hover:bg-red-700 rounded-2xl font-medium">Generate YAML</button>
            </div>
        </div>
    </div>

    <div id="yamlPreviewModal" class="fixed inset-0 bg-black/80 hidden flex items-center justify-center z-50">
        <div class="bg-slate-900 border border-slate-700 rounded-3xl w-full max-w-3xl mx-4 max-h-[90vh] flex flex-col">
            <div class="flex items-center justify-between border-b border-slate-700 p-6">
                <h2 class="text-2xl font-semibold">Generated Release YAML</h2>
                <button onclick="closeYamlPreview()" class="text-slate-400 hover:text-white text-3xl leading-none">&times;</button>
            </div>
            <div class="p-6 overflow-auto flex-1 font-mono text-xs bg-slate-950" id="yamlContent"></div>
            <div class="border-t border-slate-700 p-4 flex gap-3 justify-end">
                <button onclick="copyYAML()" class="px-6 py-3 bg-emerald-600 hover:bg-emerald-700 rounded-2xl font-medium flex items-center gap-2 transition-all">
                    <i class="fa-solid fa-copy"></i> Copy
                </button>
                <a id="githubCreateLink" href="#" target="_blank" class="px-6 py-3 bg-blue-600 hover:bg-blue-700 rounded-2xl font-medium flex items-center gap-2 transition-all">
                    <i class="fa-solid fa-github"></i> Create on GitHub
                </a>
                <button onclick="closeYamlPreview()" class="px-6 py-3 bg-slate-800 hover:bg-slate-700 rounded-2xl">Close</button>
            </div>
        </div>
    </div>

    <div id="toastNotification" class="fixed bottom-6 right-6 bg-slate-900 border border-emerald-500/30 text-slate-100 px-5 py-4 rounded-2xl shadow-2xl flex items-center gap-3 translate-y-20 opacity-0 pointer-events-none transition-all duration-300 z-50">
        <div class="w-8 h-8 rounded-xl bg-emerald-500/10 border border-emerald-500/20 flex items-center justify-center text-emerald-400">
            <i class="fa-solid fa-circle-check"></i>
        </div>
        <div>
            <h4 class="text-xs font-black text-white uppercase tracking-wider">System Action Complete</h4>
            <p class="text-[11px] text-slate-400 mt-0.5 font-medium">YAML structure copied to system clipboard successfully.</p>
        </div>
    </div>

    <script>
        let allReleases = [];

        // Helper to extract clean app folder structures
        function getAppFolder(fullPath) {
            const parts = fullPath.split('/');
            if (parts[0] === 'App') parts.shift();
            return parts[0] || '';
        }

        async function loadReleases() {
            const container = document.getElementById('releasesContainer');
            container.innerHTML = `<div class="col-span-full text-center py-16 text-slate-400">
                <i class="fa-solid fa-circle-notch fa-spin text-3xl mb-4"></i><p>Loading releases...</p>
            </div>`;

            try {
                const res = await fetch('../App/index.json');
                if (!res.ok) throw new Error("index.json not found");
                const files = await res.json();
                allReleases = files.filter(f => typeof f === 'string' && f.endsWith('.yml'));

                // FIXED: Populate dropdown using getAppFolder matching data properties perfectly
                const apps = [...new Set(allReleases.map(f => getAppFolder(f)))].sort();
                const appSelect = document.getElementById('appFilter');
                appSelect.innerHTML = '<option value="">All Applications</option>';
                apps.forEach(app => {
                    appSelect.innerHTML += `<option value="${app}">${app}</option>`;
                });

                renderReleases(allReleases);
            } catch (e) {
                console.error(e);
                container.innerHTML = `<div class="col-span-full text-red-500 text-center py-16">Failed to load releases.<br>Check App/index.json</div>`;
            }
        }

        function renderReleases(files) {
            const container = document.getElementById('releasesContainer');
            let html = '';
            files.forEach(fullPath => {
                const parts = fullPath.split('/');
                const fileName = parts.pop();
                const match = fileName.match(/APP_([A-Z]+)_([\d.]+)\.yml/i);
                if (!match) return;
                const app = match[1];
                const version = match[2];

                html += `
                    <div class="bg-slate-900 border border-slate-700 rounded-2xl p-6 hover:border-red-500/30 transition-all group">
                        <div class="flex justify-between items-start mb-4">
                            <h3 class="text-xl font-semibold text-white tracking-wide">${app}</h3>
                            <span class="px-3 py-1 text-xs font-mono bg-slate-800 rounded-full border border-slate-700/60 text-red-400 font-bold">${version}</span>
                        </div>
                        <div class="text-xs text-slate-500 font-mono mb-6 truncate">${fileName}</div>
                        <button onclick="viewRelease('${fullPath}')" 
                                class="w-full py-3 text-sm bg-slate-800 hover:bg-slate-700 border border-slate-600 hover:border-red-500 rounded-xl transition-all font-medium">
                            View Release Details
                        </button>
                    </div>`;
            });
            container.innerHTML = html || `<div class="col-span-full text-center py-16 text-slate-500 font-medium">No releases found</div>`;
        }

        function filterReleases() {
            const searchTerm = document.getElementById('search').value.toLowerCase().trim();
            const selectedApp = document.getElementById('appFilter').value;

            const filtered = allReleases.filter(fullPath => {
                const appFolder = getAppFolder(fullPath);
                // FIXED: Direct exact string equivalence match evaluation boundary condition
                const matchesApp = !selectedApp || appFolder === selectedApp;
                const matchesSearch = !searchTerm || fullPath.toLowerCase().includes(searchTerm);
                return matchesApp && matchesSearch;
            });

            renderReleases(filtered);
        }

        function clearFilters() {
            document.getElementById('search').value = '';
            document.getElementById('appFilter').value = '';
            filterReleases();
        }

        async function viewRelease(fullPath) {
            const modal = document.getElementById('releaseModal');
            const content = document.getElementById('modalContent');
            const title = document.getElementById('modalTitle');
            title.textContent = fullPath.split('/').pop();
            content.innerHTML = `<div class="text-center py-12 text-slate-500"><i class="fa-solid fa-circle-notch fa-spin text-2xl mb-2"></i><p>Loading release file...</p></div>`;
            modal.classList.remove('hidden');

            try {
                // FIXED: Normalized fetch operations routing layers cleanly
                const cleanPath = fullPath.startsWith('App/') ? fullPath.substring(4) : fullPath;
                const res = await fetch(`../App/${cleanPath}`);
                if (!res.ok) throw new Error("File not found");
                const yamlText = await res.text();
                content.innerHTML = `<pre class="text-emerald-400 whitespace-pre-wrap text-xs leading-relaxed font-mono select-text bg-slate-950 p-4 rounded border border-slate-800">${yamlText}</pre>`;
            } catch (e) {
                content.innerHTML = `<div class="text-red-500 text-center py-12">Failed to load file.<br><small class="text-xs text-slate-600">${fullPath}</small></div>`;
            }
        }

        function closeReleaseModal() {
            document.getElementById('releaseModal').classList.add('hidden');
        }

        function showCreateModal() {
            document.getElementById('createModal').classList.remove('hidden');
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeReleaseModal();
                closeCreateModal();
                closeYamlPreview();
            }
        });

        function closeCreateModal() {
            document.getElementById('createModal').classList.add('hidden');
        }

        function generateAndShowYAML() {
            const app = document.getElementById('newApp').value;
            const version = document.getElementById('newVersion').value.trim() || '1.0.0';
            const env = document.getElementById('newEnv').value;
            const changesText = document.getElementById('newChanges').value.trim();

            const changes = changesText 
                ? changesText.split('\n').map(line => `  - ${line.trim()}`).join('\n') 
                : '  - Initial release';

            const yaml = `# Linedata Release Manifest - ${app} v${version}
release:
  version: "${version}"
  date: "${new Date().toISOString().split('T')[0]}"
  environment: "${env}"

application:
  name: ${app}
  client: CLIENT_${app.slice(-1)}
  description: ${app} Release

changes:
${changes}

metadata:
  build_id: "build-${Date.now()}"
  triggered_by: "releases-dashboard"
  notes: "Generated via Linedata Releases Portal"
`;

            document.getElementById('yamlContent').innerHTML = `<pre class="text-emerald-400 whitespace-pre-wrap text-xs leading-relaxed font-mono select-text bg-slate-950 p-4 rounded border border-slate-800">${yaml}</pre>`;
            document.getElementById('githubCreateLink').href = 
                `https://github.com/sugaredcookie/deployement_ui/new/main/App/${app}?filename=${app}_${version}.yml`;

            closeCreateModal();
            document.getElementById('yamlPreviewModal').classList.remove('hidden');
        }

        function copyYAML() {
            const preElement = document.getElementById('yamlContent').querySelector('pre');
            const yaml = preElement ? preElement.textContent : '';
            navigator.clipboard.writeText(yaml).then(() => {
                // FIXED: Replaced standard generic warning alerts with a custom notification toast banner
                const toast = document.getElementById('toastNotification');
                toast.classList.remove('translate-y-20', 'opacity-0', 'pointer-events-none');
                setTimeout(() => {
                    toast.classList.add('translate-y-20', 'opacity-0', 'pointer-events-none');
                }, 3500);
            });
        }

        function closeYamlPreview() {
            document.getElementById('yamlPreviewModal').classList.add('hidden');
        }

        window.onload = loadReleases;
    </script>
</body>
</html>
