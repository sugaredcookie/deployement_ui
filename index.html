<html>
<!DOCTYPE html>
<html lang="en" class="h-full bg-[#020617]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linedata | Deployment Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 9px; }
        input:focus, select:focus {
            box-shadow: 0 0 0 2px rgba(239, 68, 68, 0.4);
            border-color: #ef4444;
        }
    </style>
</head>
<body class="text-slate-200 bg-[#020617] p-4 md:p-8 min-h-screen">
    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <div class="flex items-center justify-between border-b border-slate-800 pb-6 mb-8">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-diagram-project text-red-500 text-3xl"></i>
                <h1 class="text-3xl font-black tracking-tighter text-white">
                    LINEDATA DEPLOYMENT DASHBOARD
                </h1>
            </div>

            <!-- Improved View Releases Button -->
            <a href="releases.html" 
               class="flex items-center gap-2 px-6 py-3 bg-slate-800 hover:bg-slate-700 border border-slate-600 hover:border-red-500/50 rounded-2xl text-sm font-medium transition-all duration-200 group">
                <i class="fa-solid fa-list-check text-red-400 group-hover:rotate-12 transition-transform"></i>
                <span>View All Releases</span>
            </a>

            <div class="flex items-center gap-2 text-sm font-mono">
                <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
                <span class="text-slate-400">Platform Development</span>
                <span class="text-emerald-400">• LIVE</span>
            </div>
        </div>

        <!-- Filters -->
        <div class="mb-8 bg-slate-900/60 border border-slate-800 rounded-2xl p-5">
            <div class="relative mb-4">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-3.5 text-slate-500"></i>
                <input
                    id="search"
                    type="text"
                    placeholder="Search client, application, version..."
                    class="w-full bg-slate-900 border border-slate-700 rounded-xl pl-11 py-3 text-sm focus:outline-none">
            </div>
            <div class="flex flex-wrap gap-3">
                <select id="clientFilter" class="bg-slate-900 border border-slate-700 px-4 py-3 rounded-xl text-sm flex-1 min-w-[160px]">
                    <option value="">All Clients</option>
                </select>
                <select id="applicationFilter" class="bg-slate-900 border border-slate-700 px-4 py-3 rounded-xl text-sm flex-1 min-w-[160px]">
                    <option value="">All Applications</option>
                </select>
                <select id="versionFilter" class="bg-slate-900 border border-slate-700 px-4 py-3 rounded-xl text-sm flex-1 min-w-[160px]">
                    <option value="">All Versions</option>
                </select>
                <select id="environmentFilter" class="bg-slate-900 border border-slate-700 px-4 py-3 rounded-xl text-sm flex-1 min-w-[160px]">
                    <option value="">All Environments</option>
                </select>
                <!-- Clear Filters Button -->
                <button onclick="clearFilters()"
                        class="px-6 py-3 bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-xl text-sm font-medium transition-colors flex items-center gap-2 whitespace-nowrap">
                    <i class="fa-solid fa-rotate-right"></i>
                    Clear Filters
                </button>
            </div>
        </div>

        <!-- Table Container -->
        <div id="tableContainer" class="bg-slate-900/60 border border-slate-800 rounded-3xl overflow-hidden shadow-2xl">
            <div class="text-center py-16 text-slate-400">
                <i class="fa-solid fa-circle-notch fa-spin text-2xl mb-3"></i>
                <p>Loading deployment records...</p>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
