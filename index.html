<!DOCTYPE html>
<html lang="en" class="h-full bg-[#020617]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linedata | Deployment Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 9px; }
        input:focus, select:focus { box-shadow: 0 0 0 2px rgba(239, 68, 68, 0.4); }
    </style>
</head>
<body class="text-slate-300 bg-[#020617] p-6 md:p-10 min-h-screen relative tracking-normal text-xs">
    <div class="max-w-7xl mx-auto">

        <div class="flex items-center justify-between border-b border-slate-800 pb-5 mb-8">
            <div class="flex items-center gap-2.5">
                <i class="fa-solid fa-layer-group text-red-600 animate-pulse text-sm"></i>
                <h1 class="text-xl font-black text-white tracking-tight uppercase">Linedata Deployment Dashboard</h1>
            </div>
            <div class="flex gap-4 font-mono bg-slate-900/80 px-4 py-2 rounded-lg border border-slate-800 shadow-sm">
                <div><span class="text-slate-500">SYSTEM RUN STATUS:</span> <span class="text-emerald-400 font-bold">• LIVE</span></div>
            </div>
        </div>

        <div class="mb-6 flex gap-4">
            <select id="appFilter" onchange="renderTable()" 
                    class="w-full bg-slate-900 border border-slate-800 rounded-lg px-4 py-3 font-medium outline-none cursor-pointer tracking-wide shadow-inner text-slate-200">
                <option value="">All Applications</option>
            </select>
            <a href="releases.html" class="px-5 py-3 bg-slate-900 border border-slate-800 hover:bg-slate-800 rounded-lg font-semibold flex items-center gap-2 whitespace-nowrap transition-all shadow-sm text-slate-200">
                <i class="fa-solid fa-clock-history text-red-400"></i> Release Ledger
            </a>
        </div>

        <div class="bg-slate-900/50 border border-slate-800 rounded-xl overflow-hidden shadow-2xl">
            <table class="w-full text-left table-fixed text-xs border-collapse">
                <thead>
                    <tr class="border-b border-slate-800 bg-slate-950 font-bold uppercase tracking-wider text-slate-400 text-[10px]">
                        <th class="p-4 pl-8 w-[20%] border-r border-slate-800/60">Client</th>
                        <th class="p-4 w-[25%] border-r border-slate-800/60">App Module</th>
                        <th class="p-4 text-center w-[27%] border-r border-slate-800/60 bg-slate-950/40">UAT</th>
                        <th class="p-4 text-center w-[28%] bg-slate-950/20">PROD</th>
                    </tr>
                </thead>
                <tbody id="matrix-body" class="divide-y divide-slate-800">
                    <tr>
                        <td colspan="4" class="p-12 text-center text-slate-500 font-medium font-mono text-xs">
                            <i class="fa-solid fa-circle-notch fa-spin mr-2 text-red-500"></i>Loading tracking paths...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="upgradeModal" class="fixed inset-0 bg-black/75 hidden flex items-center justify-center z-50 p-4 transition-all">
        <div class="bg-slate-900 border border-slate-800 rounded-xl w-full max-w-md flex flex-col overflow-hidden shadow-2xl">
            <div class="flex items-center justify-between border-b border-slate-800 p-4 bg-slate-950/20">
                <div>
                    <h2 class="text-sm font-bold text-white uppercase tracking-wider">Select Target Upgrade Version</h2>
                    <p id="upgradeTargetSubtitle" class="text-[11px] font-mono text-slate-500 mt-0.5"></p>
                </div>
                <button onclick="closeUpgradeModal()" class="text-slate-400 hover:text-white text-lg leading-none">&times;</button>
            </div>
            <div class="p-5 space-y-4">
                <div>
                    <label class="block text-slate-400 font-mono text-[10px] mb-1.5 tracking-wider">AVAILABLE NEWER UAT VERSIONS (ASCENDING)</label>
                    <select id="upgradeVersionSelect" class="w-full bg-slate-950 border border-slate-800 rounded p-2.5 outline-none text-xs text-slate-200 font-mono cursor-pointer"></select>
                </div>
                <div id="upgradeNoVersionsWarning" class="hidden p-3 bg-amber-500/10 border border-amber-500/20 text-amber-400 rounded text-[11px] leading-relaxed">
                    <i class="fa-solid fa-circle-info mr-1"></i> No newer versions for this application have passed UAT verification yet.
                </div>
            </div>
            <div class="border-t border-slate-800 p-3 flex gap-2 justify-end bg-slate-950/10">
                <button onclick="closeUpgradeModal()" class="px-3 py-1.5 bg-slate-800 hover:bg-slate-700 rounded text-xs font-semibold transition text-slate-300">Cancel</button>
                <button id="upgradeConfirmBtn" onclick="submitUpgradeAction()" class="px-4 py-1.5 bg-blue-600 hover:bg-blue-700 text-white rounded text-xs font-semibold transition">Trigger Upgrade</button>
            </div>
        </div>
    </div>

    <script>
        const deploymentLogsCSV = "../applications/deploymentlogs.csv";

        let deployments = [];
        let upgradeContext = null;

        const parseVersionToNumericArray = v => (!v || v === '—' || v === '-') ? [] : v.replace(/[^0-9.]/g, '').split('.').map(n => parseInt(n || 0, 10));

        function compareVersions(vA, vB) {
            const tA = parseVersionToNumericArray(vA), tB = parseVersionToNumericArray(vB);
            const max = Math.max(tA.length, tB.length);
            for (let i = 0; i < max; i++) {
                const nA = tA[i] || 0, nB = tB[i] || 0;
                if (nA !== nB) return nA - nB;
            }
            return 0;
        }

        async function loadData() {
            const container = document.getElementById('matrix-body');
            try {
                const res = await fetch(deploymentLogsCSV);
                if (!res.ok) throw new Error("deploymentlogs.csv not found");
                
                const csvText = await res.text();
                deployments = parseCSV(csvText);

                populateAppDropdown(); 
                renderTable();
            } catch (e) { 
                container.innerHTML = `<tr><td colspan="4" class="p-6 text-center text-red-400 font-bold"><i class="fa-solid fa-triangle-exclamation mr-2"></i> Failed to parse static log logs.</td></tr>`; 
            }
        }

        function parseCSV(text) {
            const lines = text.trim().split("\n");
            if (lines.length === 0 || !lines[0]) return [];
            const headers = lines[0].split(",").map(h => h.replace(/"/g, "").trim());
            return lines.slice(1).map(line => {
                const values = line.split(",").map(v => v.replace(/"/g, "").trim());
                const row = {}; headers.forEach((h, i) => row[h] = values[i] || "");
                return row;
            });
        }

        function populateAppDropdown() {
            const apps = [...new Set(deployments.map(d => d.Application).filter(Boolean))].sort();
            const select = document.getElementById('appFilter'); select.innerHTML = `<option value="">All Applications</option>`;
            apps.forEach(app => select.innerHTML += `<option value="${app}">${app}</option>`);
        }

        function renderTable() {
            const filterVal = document.getElementById('appFilter').value;
            const filtered = filterVal ? deployments.filter(d => d.Application === filterVal) : deployments;
            const grouped = {};

            filtered.forEach(row => {
                const key = `${row.Client}-${row.Application}`;
                if (!grouped[key]) {
                    grouped[key] = { client: row.Client, app: row.Application, uat: "-", prod: "-", rowUat: null, rowProd: null };
                }
                if (row.Environment === "UAT") { grouped[key].uat = row.Version; grouped[key].rowUat = row; }
                if (row.Environment === "PROD") { grouped[key].prod = row.Version; grouped[key].rowProd = row; }
            });

            let htmlBuffer = '';
            Object.values(grouped).forEach(item => {
                const idUat = item.rowUat?.ReleaseId || "—", idProd = item.rowProd?.ReleaseId || "—";
                const displayAppName = item.app;

                htmlBuffer += `
                    <tr class="hover:bg-slate-800/30 bg-slate-900/20 transition group">
                        <td class="p-4 pl-8 font-extrabold text-white tracking-wide truncate border-r border-slate-800/60">${item.client.replace(/_/g, ' ')}</td>
                        <td class="p-4 font-sans font-bold text-slate-100 text-[13px] truncate border-r border-slate-800/60">${displayAppName.replace(/_/g, ' ')}</td>
                        <td class="p-4 text-center bg-slate-950/20 border-r border-slate-800/60">
                            <span class="font-mono text-xs font-bold ${item.uat !== '-' ? 'bg-slate-950 border border-blue-500/40 text-blue-400' : 'text-slate-600 bg-slate-900/40'} px-2.5 py-1 rounded shadow-sm inline-block min-w-[90px]">${item.uat}</span>
                            <div class="text-[10px] text-slate-400 font-mono mt-1 font-semibold">${idUat}</div>
                            <div class="mt-2.5 space-x-1 flex items-center justify-center">
                                ${item.uat !== '-' ? `
                                    <button onclick="triggerPipelineAction('PROMOTION', '${item.client}', '${displayAppName}', 'UAT', 'PROD', '${idUat}', '${item.uat}')" class="px-2.5 py-1 rounded bg-green-600/10 border border-green-500/30 text-green-400 hover:bg-green-600 hover:text-white text-[9px] font-bold uppercase tracking-wider transition-all shadow-sm">Promote</button>
                                    <button onclick="triggerPipelineAction('ROLLBACK', '${item.client}', '${displayAppName}', 'QA', 'UAT', '${idUat}', '${item.uat}')" class="px-2.5 py-1 rounded bg-slate-800 border border-slate-700 text-slate-300 hover:bg-amber-600 hover:text-white hover:border-amber-500 text-[9px] font-bold uppercase tracking-wider transition-all shadow-sm">Rollback</button>
                                ` : ''}
                                <button onclick="openUpgradeWizard('${item.client}', '${displayAppName}', '${item.uat}', 'UAT')" class="px-2.5 py-1 rounded bg-blue-600/10 border border-blue-500/30 text-blue-400 hover:bg-blue-600 hover:text-white text-[9px] font-bold uppercase tracking-wider transition-all shadow-sm">Upgrade</button>
                            </div>
                        </td>
                        <td class="p-4 text-center bg-slate-950/10">
                            <span class="font-mono text-xs font-bold ${item.prod !== '-' ? 'bg-slate-950 border border-emerald-500/40 text-emerald-400' : 'text-slate-600 bg-slate-900/40'} px-2.5 py-1 rounded shadow-sm inline-block min-w-[90px]">${item.prod}</span>
                            <div class="text-[10px] text-slate-400 font-mono mt-1 font-semibold">${idProd}</div>
                            <div class="mt-2.5 space-x-1 flex items-center justify-center">
                                ${item.prod !== '-' ? `
                                    <button onclick="triggerPipelineAction('ROLLBACK', '${item.client}', '${displayAppName}', 'UAT', 'PROD', '${idProd}', '${item.prod}')" class="px-2.5 py-1 rounded bg-slate-800 border border-slate-700 text-slate-300 hover:bg-amber-600 hover:text-white hover:border-amber-500 text-[9px] font-bold uppercase tracking-wider transition-all shadow-sm">Rollback</button>
                                ` : ''}
                                <button onclick="openUpgradeWizard('${item.client}', '${displayAppName}', '${item.prod}', 'PROD')" class="px-2.5 py-1 rounded bg-blue-600/10 border border-blue-500/30 text-blue-400 hover:bg-blue-600 hover:text-white text-[9px] font-bold uppercase tracking-wider transition-all shadow-sm">Upgrade</button>
                            </div>
                        </td>
                    </tr>`;
            });
            document.getElementById('matrix-body').innerHTML = htmlBuffer || `<tr><td colspan="4" class="p-8 text-center text-slate-400 font-medium">No records match.</td></tr>`;
        }

        window.triggerPipelineAction = function() {
            window.open(`https://github.com/sugaredcookie/linedata_task_1/actions/workflows/deployment.yml?query=branch%3Amain+event%3Aworkflow_dispatch`, '_blank');
        };

        window.openUpgradeWizard = function(client, app, curVer, targetEnv) {
            upgradeContext = { client, app, currentVersion: curVer, targetEnv };
            document.getElementById('upgradeTargetSubtitle').textContent = `App: ${app} | Active ${targetEnv} Version: ${curVer}`;
            
            const uatList = [...new Set(deployments.filter(d => d.Application === app && d.Environment === "UAT" && d.Version && d.Version !== '-').map(d => d.Version))];
            const newerVers = uatList.filter(v => curVer === '-' || compareVersions(v, curVer) > 0).sort(compareVersions);

            const select = document.getElementById('upgradeVersionSelect'), confirmBtn = document.getElementById('upgradeConfirmBtn'), warningBox = document.getElementById('upgradeNoVersionsWarning');
            select.innerHTML = '';
            
            if (!newerVers.length) {
                select.classList.add('hidden'); confirmBtn.classList.add('hidden'); warningBox.classList.remove('hidden');
            } else {
                select.classList.remove('hidden'); confirmBtn.classList.remove('hidden'); warningBox.classList.add('hidden');
                newerVers.forEach(v => select.innerHTML += `<option value="${v}">Version ${v}</option>`);
            }
            document.getElementById('upgradeModal').classList.remove('hidden');
        };

        window.submitUpgradeAction = function() {
            if (!upgradeContext) return;
            const targetVersion = document.getElementById('upgradeVersionSelect').value;
            const match = deployments.find(d => d.Application === upgradeContext.app && d.Version === targetVersion && d.Environment === "UAT");
            
            window.triggerPipelineAction('UPGRADE', upgradeContext.client, upgradeContext.app, 'UAT', upgradeContext.targetEnv, match ? match.ReleaseId : `RLS-UPG-${Date.now().toString().slice(-4)}`, targetVersion);
            window.closeUpgradeModal();
        };

        window.closeUpgradeModal = () => { document.getElementById('upgradeModal').classList.add('hidden'); upgradeContext = null; };
        document.addEventListener('keydown', e => { if (e.key === 'Escape') window.closeUpgradeModal(); });
        window.onload = loadData;
    </script>
</body>
</html>
