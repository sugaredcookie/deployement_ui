name: "Module Deployment Engine"

on:
  # Allows the manual dropdown trigger AND lets our bridge script call it automatically
  workflow_dispatch:
    inputs:
      client:
        description: 'Client name'
        required: true
        type: choice
        options:
          - QA
          - BAIN
          - DKCM
          - MASH
          - KLIM
          - MPCM
          - MTEU
          - QRMO
          - DEMO
      module:
        description: 'Module/Application name matching App folder'
        required: true
        type: string
      version:
        description: 'Module version (e.g., 2.26.0428.92)'
        required: true
        type: string
      stage:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - QA
          - UAT
          - PROD

jobs:
  execute-deployment:
    name: "Deploy ${{ github.event.inputs.module }} v${{ github.event.inputs.version }}"
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout Source Code"
        uses: actions/checkout@v3

      - name: "Initialize Deployment Environment"
        run: |
          echo "==============================================="
          echo "INITIALIZING LINEDATA PIPELINE TARGET"
          echo "==============================================="
          echo "Client      : ${{ github.event.inputs.client }}"
          echo "Module      : ${{ github.event.inputs.module }}"
          echo "Version     : ${{ github.event.inputs.version }}"
          echo "Target Stage: ${{ github.event.inputs.stage }}"
          echo "==============================================="

      # PLACEHOLDER: This is where your actual build, Docker push, or SSH deployment commands will run
      - name: "Executing Simulated Deployment Steps"
        run: |
          echo "Connecting to Linedata ${{ github.event.inputs.stage }} cluster..."
          sleep 3
          echo "Deploying artifact matching manifest build tracking matrix..."
          sleep 2
          echo "Verification tests passed successfully."

      - name: "Log Success Status"
        run: |
          echo "Successfully completed deployment tracking for ${{ github.event.inputs.module }} v${{ github.event.inputs.version }} to ${{ github.event.inputs.stage }}!"
          
      - name: "Append New Log Entry to CSV"
        run: |
          # 1. Get current timestamp in UTC
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          
          # 2. Build the CSV line matching your header structure:
          # "Client","Application","Version","Environment","DeploymentStatus","DeploymentDateTime","TriggeredBy"
          NEW_ROW="\"${{ github.event.inputs.client }}\",\"${{ github.event.inputs.module }}\",\"${{ github.event.inputs.version }}\",\"${{ github.event.inputs.stage }}\",\"Succeeded\",\"$TIMESTAMP\",\"${{ github.actor }}\""
          
          # 3. Append to the file
          echo "$NEW_ROW" >> applications/deploymentlogs.csv
          
      - name: "Commit and Push Updated Logs"
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add applications/deploymentlogs.csv
          git commit -m "chore: log successful deployment of ${{ github.event.inputs.module }} v${{ github.event.inputs.version }} to ${{ github.event.inputs.stage }}"
          git push