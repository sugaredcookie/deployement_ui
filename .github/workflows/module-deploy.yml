name: "Module Deployment Engine"

on:
  workflow_dispatch:
    inputs:
      client:
        description: 'Client name'
        required: true
        type: choice
        options:
          - CLIENT_A
          - CLIENT_B
          - CLIENT_C
          - CLIENT_D
      module:
        description: 'Module/Application name matching App folder'
        required: true
        type: string
      version:
        description: 'Module version (e.g., 2.26.0428.92)'
        required: true
        type: string
      stage:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - QA
          - UAT
          - PROD

jobs:
  execute-deployment:
    name: "Deploy ${{ github.event.inputs.module }} v${{ github.event.inputs.version }}"
    runs-on: windows-latest   # switched to Windows runner for PowerShell

    steps:
      - name: "Checkout Source Code"
        uses: actions/checkout@v3

      - name: "Initialize Deployment Environment"
        shell: pwsh
        run: |
          Write-Host "==============================================="
          Write-Host "INITIALIZING LINEDATA PIPELINE TARGET"
          Write-Host "==============================================="
          Write-Host "Client      : ${{ github.event.inputs.client }}"
          Write-Host "Module      : ${{ github.event.inputs.module }}"
          Write-Host "Version     : ${{ github.event.inputs.version }}"
          Write-Host "Target Stage: ${{ github.event.inputs.stage }}"
          Write-Host "==============================================="

      - name: "Executing Simulated Deployment Steps"
        shell: pwsh
        run: |
          Write-Host "Connecting to Linedata ${{ github.event.inputs.stage }} cluster..."
          Start-Sleep -Seconds 3
          Write-Host "Deploying artifact matching manifest build tracking matrix..."
          Start-Sleep -Seconds 2
          Write-Host "Verification tests passed successfully."

      - name: "Log Success Status"
        shell: pwsh
        run: |
          Write-Host "Successfully completed deployment tracking for ${{ github.event.inputs.module }} v${{ github.event.inputs.version }} to ${{ github.event.inputs.stage }}!"

      - name: "Append New Log Entry to CSV"
        shell: pwsh
        run: |
          # Get current timestamp in UTC
          $timestamp = (Get-Date).ToUniversalTime().ToString("yyyy-MM-dd HH:mm:ss 'UTC'")

          $csvPath = "applications/deploymentlogs.csv"

          $newRow = [PSCustomObject]@{
            Client             = "${{ github.event.inputs.client }}"
            Application        = "${{ github.event.inputs.module }}"
            Version            = "${{ github.event.inputs.version }}"
            Environment        = "${{ github.event.inputs.stage }}"
            DeploymentStatus   = "Succeeded"
            DeploymentDateTime = $timestamp
            TriggeredBy        = "${{ github.actor }}"
          }

          # Read existing rows
          $rows = Import-Csv $csvPath

          # Add new row
          $rows += $newRow

          # Rewrite the file
          $rows | Export-Csv -Path $csvPath -NoTypeInformation -Encoding utf8

      - name: "Commit and Push Updated Logs"
        shell: pwsh
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add applications/deploymentlogs.csv
          git commit -m "chore: log successful deployment of ${{ github.event.inputs.module }} v${{ github.event.inputs.version }} to ${{ github.event.inputs.stage }}"
          git push
